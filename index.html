<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego()">
    <div class="gameboy-body">
        
        <div class="screen-container">
            <div class="screen-header">DOT MATRIX WITH STEREO SOUND</div>
            <canvas id="areaJuego" width="500" height="500"></canvas>
            
            <div class="panel">
                <span>PUNTOS: <span id="puntos">0</span></span>
                <span>TIEMPO: <span id="tiempo">10</span></span>
            </div>
        </div>

        <div class="controles">
            <div class="d-pad">
                <button id="btnArriba" class="pad-btn up">▲</button>
                <button id="btnIzquierda" class="pad-btn left">◀</button>
                <button id="btnAbajo" class="pad-btn down">▼</button>
                <button id="btnDerecha" class="pad-btn right">▶</button>
                <div class="center-pad"></div>
            </div>
            
            <div class="start-area">
                <button onclick="reiniciar()" class="btn-start">REINICIAR</button>
            </div>
        </div>
        
        <p id="mensaje"></p>
    </div>
    
    <script src="cazando.js"></script>
</body>
</html>
